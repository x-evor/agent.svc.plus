# Default inventory.
# Define the actual target environment here before running deploy.sh without --prod.
[agent_svc_plus]
# node-xhttp.svc.plus ansible_host=203.0.113.20 ansible_user=root

[all:vars]
ansible_port=22
ansible_user=root
ansible_host_key_checking=False
ansible_ssh_common_args='-o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_ssh_private_key_file=~/.ssh/id_rsa
