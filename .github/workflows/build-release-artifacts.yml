name: Build Release Artifacts

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version-file: go.mod

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@v0.4.5

      - name: Build agent-svc-plus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/agent-svc-plus ./cmd/agent

      - name: Build custom caddy
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          "$(go env GOPATH)/bin/xcaddy" build v2.11.1 \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/caddy-dns/alidns \
            --with github.com/mholt/caddy-l4 \
            --output dist/caddy

      - name: Prepare bundle
        run: |
          mkdir -p bundle/config release-assets
          cp dist/agent-svc-plus bundle/agent-svc-plus
          cp dist/caddy bundle/caddy
          cp account-agent.yaml bundle/account-agent.yaml
          cp config/*.template.json bundle/config/
          tar -czf "release-assets/artifact-${{ matrix.goarch }}.tar.gz" -C bundle .
          cp dist/agent-svc-plus "release-assets/agent-svc-plus-linux-${{ matrix.goarch }}"
          cp dist/caddy "release-assets/caddy-linux-${{ matrix.goarch }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: release-assets-${{ matrix.goarch }}
          path: release-assets/
          if-no-files-found: error

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            release-assets/* \
            --clobber
