name: Build Release Artifacts

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version-file: go.mod

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@v0.4.5

      - name: Build agent-svc-plus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/agent-svc-plus ./cmd/agent

      - name: Build custom caddy
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          "$(go env GOPATH)/bin/xcaddy" build v2.11.1 \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/caddy-dns/alidns \
            --with github.com/mholt/caddy-l4 \
            --output dist/caddy

      - name: Prepare bundle
        run: |
          mkdir -p bundle/config
          cp dist/agent-svc-plus bundle/agent-svc-plus
          cp dist/caddy bundle/caddy
          cp account-agent.yaml bundle/account-agent.yaml
          cp config/*.template.json bundle/config/
          tar -czf artifact.tar.gz -C bundle .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: artifact-${{ matrix.goarch }}
          path: artifact.tar.gz
          if-no-files-found: error

      - name: Rename release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp artifact.tar.gz artifact-${{ matrix.goarch }}.tar.gz
          cp dist/agent-svc-plus agent-svc-plus-linux-${{ matrix.goarch }}
          cp dist/caddy caddy-linux-${{ matrix.goarch }}

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "artifact-${{ matrix.goarch }}.tar.gz" \
            "agent-svc-plus-linux-${{ matrix.goarch }}" \
            "caddy-linux-${{ matrix.goarch }}" \
            --clobber
