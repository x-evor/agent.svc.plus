# Agent Service Plus Configuration Template
# Copy this file to /etc/agent/account-agent.yaml and customize for your node

mode: "agent"

log:
  level: info

agent:
  # Unique identifier for this agent node (e.g., "hk-xhttp.svc.plus", "us-tcp.svc.plus")
  id: "your-node-id.svc.plus"
  
  # URL of the accounts.svc.plus controller
  controllerUrl: "https://accounts-svc-plus-266500572462.asia-northeast1.run.app"
  
  # Authentication token (shared across all agents, matches INTERNAL_SERVICE_TOKEN in accounts.svc.plus)
  apiToken: "your-internal-service-token-here"
  
  # HTTP client timeout for controller requests
  httpTimeout: 15s
  
  # Interval for sending status heartbeat to controller
  statusInterval: 1m
  
  # Interval for syncing Xray client configurations
  syncInterval: 5m
  
  # TLS settings for controller communication
  tls:
    insecureSkipVerify: false

xray:
  sync:
    enabled: true
    interval: 5m
    targets:
      # XHTTP Transport Configuration
      - name: "xhttp"
        outputPath: "/usr/local/etc/xray/config.json"
        templatePath: "/usr/local/etc/xray/templates/xray.xhttp.template.json"
        validateCommand: []
        restartCommand:
          - "systemctl"
          - "restart"
          - "xray.service"
      
      # TCP Transport Configuration
      - name: "tcp"
        outputPath: "/usr/local/etc/xray/tcp-config.json"
        templatePath: "/usr/local/etc/xray/templates/xray.tcp.template.json"
        validateCommand: []
        restartCommand:
          - "systemctl"
          - "restart"
          - "xray-tcp.service"
